<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 250" width="100%">
    <defs>
        <!-- Dark radial gradient for background visual depth -->
        <radialGradient id="bg-grad" cx="50%" cy="40%" r="60%" fx="50%" fy="30%">
            <stop offset="0%" stop-color="#181818" />
            <stop offset="60%" stop-color="#0a0a0a" />
            <stop offset="100%" stop-color="#020202" />
        </radialGradient>
        
        <!-- Premium Gold Linear Gradient -->
        <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#9a7a35" />
            <stop offset="25%" stop-color="#caa75a" />
            <stop offset="50%" stop-color="#fdf0cd" />
            <stop offset="75%" stop-color="#caa75a" />
            <stop offset="100%" stop-color="#9a7a35" />
        </linearGradient>

        <!-- Waving Gold Gradient -->
        <linearGradient id="gold-wave-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#bf953f" stop-opacity="0.08" />
            <stop offset="50%" stop-color="#fcf6ba" stop-opacity="0.18" />
            <stop offset="100%" stop-color="#b38728" stop-opacity="0.03" />
        </linearGradient>

        <linearGradient id="wave-border" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#9a7a35" />
            <stop offset="50%" stop-color="#fdf0cd" />
            <stop offset="100%" stop-color="#9a7a35" />
        </linearGradient>

        <!-- Dynamic drop shadow for text -->
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.85" />
        </filter>
        
        <style>
            .title {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                font-weight: 800;
                font-size: 52px;
                fill: url(#gold-grad);
                text-anchor: middle;
                letter-spacing: 5px;
                filter: url(#shadow);
            }
            .subtitle {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                font-weight: 400;
                font-size: 18px;
                fill: #cccccc;
                text-anchor: middle;
                letter-spacing: 2px;
                opacity: 0.95;
                filter: url(#shadow);
            }
        </style>
    </defs>
    
    <!-- Deep dark background -->
    <rect width="1000" height="250" fill="url(#bg-grad)" />

    <!-- Subtle Golden Tech Rings/Orchestration circles -->
    <circle cx="500" cy="-30" r="220" fill="none" stroke="url(#gold-grad)" stroke-width="0.5" opacity="0.12" />
    <circle cx="500" cy="-30" r="260" fill="none" stroke="url(#gold-grad)" stroke-dasharray="6,4" stroke-width="0.75" opacity="0.08" />
    <circle cx="500" cy="-30" r="300" fill="none" stroke="url(#gold-grad)" stroke-width="0.5" opacity="0.04" />

    <!-- Layer 1: Back Morphing Wave -->
    <path fill="url(#gold-wave-grad)" opacity="0.4">
        <animate attributeName="d" dur="10s" repeatCount="indefinite"
            values="M0,250 L0,210 Q250,170 500,210 T1000,210 L1000,250 Z;
                    M0,250 L0,190 Q250,230 500,190 T1000,190 L1000,250 Z;
                    M0,250 L0,210 Q250,170 500,210 T1000,210 L1000,250 Z" />
    </path>

    <!-- Layer 2: Middle Morphing Wave -->
    <path fill="url(#gold-wave-grad)" opacity="0.6">
        <animate attributeName="d" dur="7s" repeatCount="indefinite"
            values="M0,250 L0,220 Q250,200 500,220 T1000,220 L1000,250 Z;
                    M0,250 L0,205 Q250,235 500,205 T1000,205 L1000,250 Z;
                    M0,250 L0,220 Q250,200 500,220 T1000,220 L1000,250 Z" />
    </path>

    <!-- Layer 3: Front Morphing Wave -->
    <path fill="url(#gold-wave-grad)" opacity="0.8">
        <animate attributeName="d" dur="12s" repeatCount="indefinite"
            values="M0,250 L0,230 Q250,210 500,230 T1000,230 L1000,250 Z;
                    M0,250 L0,215 Q250,240 500,215 T1000,215 L1000,250 Z;
                    M0,250 L0,230 Q250,210 500,230 T1000,230 L1000,250 Z" />
    </path>

    <!-- Front Wave Gilded Highlight Line -->
    <path fill="none" stroke="url(#wave-border)" stroke-width="1.25" opacity="0.85">
        <animate attributeName="d" dur="12s" repeatCount="indefinite"
            values="M0,230 Q250,210 500,230 T1000,230;
                    M0,215 Q250,240 500,215 T1000,215;
                    M0,230 Q250,210 500,230 T1000,230" />
    </path>

    <!-- Content / Typography -->
    <text x="500" y="110" class="title">Orchestra</text>
    <text x="500" y="150" class="subtitle">Governance-first orchestration for AI-assisted development</text>
</svg>
